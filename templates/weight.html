{% extends "base.html" %}
{% block title %}Weight — Gym Tracker{% endblock %}
{% block header %}Weight{% endblock %}
{% block content %}
<div class="card card-glass">
  <h2 class="accent">Log weight</h2>
  <div class="quick-row">
    <input type="number" step="0.1" id="weight-kg" placeholder="kg today">
    <button type="button" class="btn-save" onclick="saveWeightQuick()">Save</button>
  </div>
  <p class="caption">7-day avg: <strong id="avg-7-display">—</strong> kg</p>
</div>
<div class="card card-compact">
  <div class="chart-wrap chart-sm"><canvas id="weight-chart"></canvas></div>
  <ul class="checklist checklist-compact" id="weight-history"></ul>
</div>
{% endblock %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>initWeightPage();</script>
{% endblock %}
