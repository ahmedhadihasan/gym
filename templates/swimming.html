{% extends "base.html" %}
{% block title %}Swimming — Gym Tracker{% endblock %}
{% block header %}Swimming{% endblock %}
{% block content %}
<div class="card">
  <h2>Log Swimming</h2>
  <form id="swim-form">
    <label>Date</label>
    <input type="date" id="swim-date" required>
    <label>Minutes</label>
    <input type="number" step="1" id="swim-mins" required>
    <label>Intensity</label>
    <select id="swim-intensity">
      <option value="easy">Easy</option>
      <option value="moderate" selected>Moderate</option>
      <option value="hard">Hard</option>
    </select>
    <label>Calories (edit if needed)</label>
    <input type="number" step="0.1" id="swim-cal" placeholder="Auto-calculated">
    <label>Notes</label>
    <textarea id="swim-notes" rows="2"></textarea>
    <button type="submit" class="btn btn-primary">Save Swimming</button>
  </form>
</div>
<div class="card">
  <h2>Today&apos;s Logs</h2>
  <ul class="checklist" id="swim-today"></ul>
</div>
{% endblock %}
{% block scripts %}
<script>
  document.getElementById('swim-date').value = todayISO();
  document.getElementById('swim-form').onsubmit = saveSwimming;
  loadSwimToday();
</script>
{% endblock %}
