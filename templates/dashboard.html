{% extends "base.html" %}
{% set active = 'home' %}
{% block title %}Home — Gym Tracker{% endblock %}
{% block header %}Home{% endblock %}
{% block content %}
<div id="dashboard-loading" class="empty">Loading…</div>
<div id="dashboard" style="display:none;">
  <div class="hero-today" id="hero-today">
    <div class="day-title"><span id="day-name"></span></div>
    <div class="day-sub"><span id="muscle-group"></span>
      <span id="rest-badge" class="badge badge-rest" style="display:none">Rest day</span>
    </div>
  </div>

  <div class="card card-glass">
    <h2 class="accent">Quick log</h2>
    <div class="quick-log two-col">
      <div class="quick-row">
        <label>Weight</label>
        <input type="number" step="0.1" id="q-weight" placeholder="kg">
        <button type="button" class="btn-save" onclick="quickSave('weight')">Save</button>
      </div>
      <div class="quick-row">
        <label>Calories</label>
        <input type="number" id="q-cal" placeholder="kcal">
        <button type="button" class="btn-save" onclick="quickSave('cal')">Save</button>
      </div>
      <div class="quick-row">
        <label>Protein</label>
        <input type="number" id="q-protein" placeholder="g">
        <button type="button" class="btn-save" onclick="quickSave('protein')">Save</button>
      </div>
      <div class="quick-row">
        <label>Bicycle</label>
        <input type="number" id="q-bike" placeholder="min">
        <button type="button" class="btn-save" onclick="quickSave('bike')">Save</button>
      </div>
      <div class="quick-row">
        <label>Swim</label>
        <input type="number" id="q-swim" placeholder="min">
        <button type="button" class="btn-save" onclick="quickSave('swim')">Save</button>
      </div>
      <div class="quick-row">
        <label>Steps</label>
        <input type="number" id="q-steps" placeholder="count">
        <button type="button" class="btn-save" onclick="quickSave('steps')">Save</button>
      </div>
    </div>
  </div>

  <div class="card card-compact">
    <h2>Today’s exercises</h2>
    <ul class="checklist checklist-compact" id="today-plan"></ul>
    <a href="/workout" class="btn btn-ghost" style="margin-top:0.75rem">Log workout sets →</a>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>loadDashboard();</script>
{% endblock %}
