{% extends "base.html" %}
{% set active = 'food' %}
{% block title %}Food — Gym Tracker{% endblock %}
{% block header %}Food{% endblock %}
{% block content %}
<div class="card">
  <h2>Today</h2>
  <div class="quick-log two-col">
    <div class="quick-row">
      <label>Calories</label>
      <input type="number" id="food-cal" placeholder="1800">
      <span></span>
    </div>
    <div class="quick-row">
      <label>Protein</label>
      <input type="number" id="food-protein" placeholder="160">
      <span></span>
    </div>
    <div class="quick-row">
      <label>Carbs</label>
      <input type="number" id="food-carbs" placeholder="">
      <span></span>
    </div>
    <div class="quick-row">
      <label>Fat</label>
      <input type="number" id="food-fat" placeholder="">
      <span></span>
    </div>
    <div class="quick-row">
      <label>Water (L)</label>
      <input type="number" step="0.1" id="food-water" placeholder="3.5">
      <span></span>
    </div>
    <div class="quick-row">
      <label>Steps</label>
      <input type="number" id="food-steps" placeholder="8000">
      <span></span>
    </div>
    <div class="quick-row">
      <label>Sleep (h)</label>
      <input type="number" step="0.1" id="food-sleep" placeholder="7">
      <span></span>
    </div>
    <div class="quick-row quick-row-full">
      <label>Notes</label>
      <input type="text" id="food-notes" placeholder="energy, back, hunger…">
      <button type="button" class="btn-save" onclick="saveFoodQuick()">Save all</button>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>initFoodPage();</script>
{% endblock %}
