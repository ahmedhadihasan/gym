<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a7f4e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link rel="stylesheet" href="/static/css/style.css">
  <title>{% block title %}Gym Tracker{% endblock %}</title>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="app-header">
    <h1>{% block header %}Gym Tracker{% endblock %}</h1>
    <p class="sub" id="header-date"></p>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <nav class="bottom-nav">
    <a href="/" class="{% if active == 'home' %}active{% endif %}"><span class="icon">🏠</span>Home</a>
    <a href="/workout" class="{% if active == 'workout' %}active{% endif %}"><span class="icon">💪</span>Workout</a>
    <a href="/weight" class="{% if active == 'weight' %}active{% endif %}"><span class="icon">⚖️</span>Weight</a>
    <a href="/food" class="{% if active == 'food' %}active{% endif %}"><span class="icon">🍽️</span>Food</a>
    <a href="/report" class="{% if active == 'report' %}active{% endif %}"><span class="icon">📊</span>Report</a>
  </nav>
  <div class="toast" id="toast"></div>
  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
    document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-GB', {
      weekday: 'long', day: 'numeric', month: 'short', year: 'numeric'
    });
  </script>
</body>
</html>
