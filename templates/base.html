<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0e14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link rel="stylesheet" href="/static/css/style.css">
  <title>{% block title %}Gym Tracker{% endblock %}</title>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="app-header">
    <h1>{% block header %}Gym Tracker{% endblock %}</h1>
    <p class="sub" id="header-date"></p>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <nav class="bottom-nav" id="bottom-nav" aria-label="Main">
    <a href="/" class="nav-btn{% if active == 'home' %} active{% endif %}" data-nav="home">
      <svg class="nav-svg" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="nav-label">Home</span>
    </a>
    <a href="/dashboard" class="nav-btn{% if active == 'dashboard' %} active{% endif %}" data-nav="dashboard">
      <svg class="nav-svg" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
      <span class="nav-label">Dashboard</span>
    </a>
    <a href="/report" class="nav-btn{% if active == 'report' %} active{% endif %}" data-nav="report">
      <svg class="nav-svg" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span class="nav-label">Report</span>
    </a>
    <a href="/settings" class="nav-btn{% if active == 'profile' %} active{% endif %}" data-nav="profile">
      <svg class="nav-svg" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span class="nav-label">Profile</span>
    </a>
  </nav>
  <div class="toast" id="toast"></div>
  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
      document.body.classList.add('is-pwa');
    }
    document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-GB', {
      weekday: 'long', day: 'numeric', month: 'short', year: 'numeric'
    });
    (function () {
      const map = {
        '/': 'home', '/dashboard': 'dashboard', '/report': 'report',
        '/settings': 'profile', '/course-plan': 'profile',
        '/workout': 'dashboard', '/weight': 'dashboard', '/food': 'dashboard',
      };
      const key = map[location.pathname];
      if (!key) return;
      document.querySelectorAll('#bottom-nav .nav-btn').forEach((el) => {
        const on = el.dataset.nav === key;
        el.classList.toggle('active', on);
        if (on) el.setAttribute('aria-current', 'page');
        else el.removeAttribute('aria-current');
      });
    })();
  </script>
</body>
</html>
